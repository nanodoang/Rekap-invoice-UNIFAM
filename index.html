<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cari Surat Jalan</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root{
    --ink:#16130f; --paper:#f6f2ea; --card:#fffdf8;
    --line:#e2dacb; --muted:#8b8072;
    --accent:#1f6f8b; --accent-bg:#e7f1f4;
    --gold:#b8841a; --gold-bg:#fbf2dd;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:-apple-system,Segoe UI,Roboto,sans-serif;font-size:15px;line-height:1.45;padding-bottom:50px}
  header{padding:16px;border-bottom:2px solid var(--ink);background:var(--card)}
  header h1{margin:0;font-size:19px;letter-spacing:-.3px}
  header p{margin:3px 0 0;color:var(--muted);font-size:12.5px}
  .wrap{padding:14px;max-width:740px;margin:0 auto}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:14px}
  label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin:0 0 4px}
  select,input{width:100%;padding:11px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);font-family:inherit;font-size:15px}
  .field{margin-bottom:11px}
  .btn{width:100%;padding:13px;border:none;border-radius:10px;background:var(--ink);color:var(--paper);font-weight:700;font-size:15px;cursor:pointer}
  .btn-sec{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .status{font-size:12.5px;color:var(--muted);text-align:center;padding:6px;word-break:break-word}
  .status.err{color:#c0392b}
  .status.ok{color:#2f7d4f}
  .res-head{display:flex;justify-content:space-between;align-items:baseline;margin:4px 0 10px}
  .res-head h2{margin:0;font-size:15px}
  .res-head .cnt{font-size:12px;color:var(--muted)}
  .total{background:var(--accent-bg);border:1px solid #cfe2e8;border-radius:10px;padding:11px 13px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
  .total b{color:var(--accent);font-size:19px}
  .total span{font-size:12.5px;color:var(--muted)}
  .card{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:10px;padding:12px;margin-bottom:9px}
  .sj{font-weight:800;font-size:16px;letter-spacing:.3px}
  .dist{font-size:13px;color:var(--ink);margin:3px 0 8px}
  .meta{display:flex;flex-wrap:wrap;gap:10px 16px;font-size:13px}
  .meta div b{display:block;font-size:10.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
  .rate{color:var(--gold);font-weight:700}
  .rate.none{color:var(--muted);font-weight:400}
  .empty{text-align:center;color:var(--muted);padding:34px 12px}
  .config{font-size:12px;color:var(--muted)}
  .config summary{cursor:pointer;font-weight:600;color:var(--accent)}
  .config input{font-size:13px;margin-top:6px}
  datalist{display:none}
</style>
</head>
<body>
<header>
  <h1>Cari Surat Jalan</h1>
  <p>Filter ekspedisi, tanggal & distributor → surat jalan, tgl kirim, harga</p>
</header>

<div class="wrap">
  <div class="panel">
    <div class="field">
      <label>Nama Ekspedisi</label>
      <select id="exp"><option value="">— Semua —</option></select>
    </div>
    <div class="field">
      <label>Tanggal Kirim</label>
      <select id="tgl"><option value="">— Semua tanggal —</option></select>
    </div>
    <div class="field">
      <label>Nama Distributor</label>
      <input id="dist" list="distList" placeholder="Ketik / pilih distributor…" autocomplete="off">
      <datalist id="distList"></datalist>
    </div>
    <button class="btn" id="cari">Cari</button>
    <div class="status" id="status">Memuat data…</div>
  </div>

  <details class="panel config">
    <summary>Pengaturan sumber data</summary>
    <div style="margin-top:10px">
      <label>ID Google Sheet</label>
      <input id="sid" value="1RFH2UALr_IM_epOBotEt7UDeudRH71D_Kc7-vE_dzgw">
      <label style="margin-top:8px">GID (nomor sheet)</label>
      <input id="gid" value="509254307">
      <button class="btn btn-sec" id="reload" style="margin-top:10px">Muat Ulang Data</button>
    </div>
  </details>

  <div id="results"></div>
</div>

<script>
const $=id=>document.getElementById(id);
let ROWS=[];

function fmtRp(n){return n>0?'Rp '+Math.round(n).toLocaleString('id-ID'):null;}
function toNum(v){
  if(v==null||v==='')return 0;
  if(typeof v==='number')return v;
  let s=String(v).replace(/[^0-9,.-]/g,'');
  if(/,\d{1,2}$/.test(s))s=s.replace(/\./g,'').replace(',','.');else s=s.replace(/,/g,'');
  const n=parseFloat(s);return isNaN(n)?0:n;
}

function setStatus(msg,cls){$('status').textContent=msg;$('status').className='status'+(cls?' '+cls:'');}

async function fetchTimeout(url,ms){
  const ctrl=new AbortController();
  const id=setTimeout(()=>ctrl.abort(),ms);
  try{ const r=await fetch(url,{signal:ctrl.signal}); return r; }
  finally{ clearTimeout(id); }
}

async function loadData(){
  const sid=$('sid').value.trim(), gid=$('gid').value.trim();
  setStatus('Memuat data…');
  const csv=`https://docs.google.com/spreadsheets/d/${sid}/export?format=csv&gid=${gid}`;
  const tries=[
    {name:'langsung', url:csv},
    {name:'gviz', url:`https://docs.google.com/spreadsheets/d/${sid}/gviz/tq?tqx=out:csv&gid=${gid}`},
    {name:'cadangan', url:'https://api.allorigins.win/raw?url='+encodeURIComponent(csv)},
  ];
  for(const t of tries){
    try{
      setStatus('Memuat data… ('+t.name+')');
      const res=await fetchTimeout(t.url, 12000);
      if(!res.ok) throw new Error('HTTP '+res.status);
      const text=await res.text();
      if(!text || text.trim().startsWith('<')) throw new Error('bukan data CSV');
      const parsed=Papa.parse(text,{skipEmptyLines:true});
      if(parsed.data && parsed.data.length>1){ parseRows(parsed.data); return; }
      throw new Error('data kosong');
    }catch(e){ /* coba metode berikutnya */ }
  }
  setStatus('Gagal memuat. Buka aplikasi ini lewat GitHub Pages (https), bukan file lokal.','err');
}

function parseRows(data){
  // cari baris header tabel (yang mengandung "No surat jalan")
  let hIdx=-1;
  for(let i=0;i<data.length;i++){
    const joined=data[i].join('|').toLowerCase();
    if(joined.includes('surat jalan')&&joined.includes('rate')){hIdx=i;break;}
  }
  const start = hIdx>=0 ? hIdx+1 : 0;
  // kolom: A0 exp,B1 nopol,C2 tgl,D3 dist,E4 cont,F5 rate,G6 so,H7 sj,I8 m3
  const out=[]; let lastRate=0,lastKey='';
  for(let i=start;i<data.length;i++){
    const c=data[i];
    if(!c)continue;
    const exp=(c[0]||'').trim();
    const nopol=(c[1]||'').trim();
    const tgl=(c[2]||'').trim();
    const dist=(c[3]||'').trim();
    const cont=(c[4]||'').trim();
    let rate=toNum(c[5]);
    const so=(c[6]||'').trim();
    const sj=(c[7]||'').trim();
    if(!sj||!exp||exp.toLowerCase()==='nama expedisi')continue;
    const key=nopol+cont+tgl;
    if(rate>0){lastRate=rate;lastKey=key;}
    else if(key===lastKey&&lastKey){rate=lastRate;}
    else{lastRate=0;}
    out.push({exp,nopol,tgl,dist,cont,rate,so,sj});
  }
  ROWS=out;
  buildFilters();
  if(!ROWS.length){setStatus('Terhubung, tapi tidak ada baris data terbaca. Cek GID sheet.','err');}
  else setStatus(ROWS.length+' baris data dimuat. Siap dicari.','ok');
}

function buildFilters(){
  const exps=[...new Set(ROWS.map(r=>r.exp))].sort();
  const tgls=[...new Set(ROWS.map(r=>r.tgl).filter(Boolean))];
  const dists=[...new Set(ROWS.map(r=>r.dist).filter(Boolean))].sort();
  $('exp').innerHTML='<option value="">— Semua —</option>'+exps.map(e=>`<option>${e}</option>`).join('');
  $('tgl').innerHTML='<option value="">— Semua tanggal —</option>'+tgls.map(t=>`<option>${t}</option>`).join('');
  $('distList').innerHTML=dists.map(d=>`<option value="${d.replace(/"/g,'&quot;')}">`).join('');
}

function cari(){
  const e=$('exp').value, t=$('tgl').value, d=$('dist').value.trim().toLowerCase();
  let res=ROWS.filter(r=>(!e||r.exp===e)&&(!t||r.tgl===t)&&(!d||r.dist.toLowerCase().includes(d)));
  render(res);
}

function render(res){
  const box=$('results');
  if(!res.length){box.innerHTML='<div class="panel empty">Tidak ada surat jalan yang cocok.</div>';return;}
  const seen=new Set(); let total=0;
  res.forEach(r=>{const k=r.nopol+r.cont+r.tgl;if(r.rate>0&&!seen.has(k)){seen.add(k);total+=r.rate;}});
  let html=`<div class="res-head"><h2>Hasil Pencarian</h2><span class="cnt">${res.length} surat jalan</span></div>`;
  if(total>0)html+=`<div class="total"><span>Total harga (per kontainer)</span><b>${fmtRp(total)}</b></div>`;
  html+=res.map(r=>`
    <div class="card">
      <div class="sj">${r.sj}</div>
      <div class="dist">${r.dist||'—'}</div>
      <div class="meta">
        <div><b>Ekspedisi</b>${r.exp}</div>
        <div><b>Tgl Kirim</b>${r.tgl||'—'}</div>
        <div><b>No SO</b>${r.so||'—'}</div>
        <div><b>Harga</b><span class="rate ${r.rate>0?'':'none'}">${r.rate>0?fmtRp(r.rate):'(ikut kontainer)'}</span></div>
      </div>
    </div>`).join('');
  box.innerHTML=html;
  box.scrollIntoView({behavior:'smooth',block:'nearest'});
}

$('cari').onclick=cari;
$('dist').addEventListener('keydown',e=>{if(e.key==='Enter')cari();});
$('reload').onclick=loadData;
loadData();
</script>
</body>
</html>
