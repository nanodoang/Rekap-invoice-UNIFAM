<meta charset="UTF-8">

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root{
    --ink:#16130f; --paper:#f6f2ea; --card:#fffdf8;
    --line:#e2dacb; --muted:#8b8072;
    --accent:#1f6f8b; --accent-bg:#e7f1f4;
    --gold:#b8841a; --gold-bg:#fbf2dd;
    --ok:#2f7d4f; --ok-bg:#e7f3eb;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:-apple-system,Segoe UI,Roboto,sans-serif;font-size:15px;line-height:1.45;padding-bottom:80px}
  header{padding:16px;border-bottom:2px solid var(--ink);background:var(--card)}
  header h1{margin:0;font-size:19px;letter-spacing:-.3px}
  header p{margin:3px 0 0;color:var(--muted);font-size:12.5px}
  .wrap{padding:14px;max-width:760px;margin:0 auto}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:14px}
  label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin:0 0 4px}
  select,input{width:100%;padding:11px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);font-family:inherit;font-size:15px}
  .field{margin-bottom:11px}
  .btn{width:100%;padding:13px;border:none;border-radius:10px;background:var(--ink);color:var(--paper);font-weight:700;font-size:15px;cursor:pointer}
  .btn-sec{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .status{font-size:12.5px;color:var(--muted);text-align:center;padding:6px;word-break:break-word}
  .status.err{color:#c0392b} .status.ok{color:var(--ok)}
  .res-head{display:flex;justify-content:space-between;align-items:center;margin:4px 0 10px;gap:8px}
  .res-head h2{margin:0;font-size:15px}
  .res-head .cnt{font-size:12px;color:var(--muted)}
  .total{background:var(--accent-bg);border:1px solid #cfe2e8;border-radius:10px;padding:11px 13px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
  .total b{color:var(--accent);font-size:19px}
  .total span{font-size:12.5px;color:var(--muted)}
  .chk{width:17px;height:17px;flex:none;accent-color:var(--ok)}
  .rate{color:var(--gold);font-weight:700}
  .rate.none{color:var(--muted);font-weight:400}
  .tblwrap{overflow-x:auto;border:1px solid var(--line);border-radius:10px;margin-bottom:12px}
  table.restbl{width:100%;border-collapse:collapse;background:var(--card);table-layout:fixed;font-size:11px;min-width:860px}
  table.restbl th,table.restbl td{padding:5px 5px;text-align:left;border-bottom:1px solid var(--line);word-break:break-word;overflow-wrap:anywhere;vertical-align:top}
  table.restbl th{background:#efe9dd;font-size:9px;text-transform:uppercase;letter-spacing:.2px;color:var(--muted)}
  table.restbl tr.rrow{cursor:pointer}
  table.restbl tr.sel td{background:var(--ok-bg)}
  table.restbl td.sj{font-weight:700}
  table.restbl td.sj .so{font-weight:400;color:var(--muted)}
  table.restbl td.m3,table.restbl th.m3{text-align:right}
  table.restbl td.rate,table.restbl th.rate{text-align:right}
  table.restbl td.editcell{padding:3px}
  table.restbl td.editcell input{width:100%;padding:5px;border:1px solid var(--line);border-radius:6px;font-size:11px;font-family:inherit}
  table.restbl td.muted2{color:var(--line);text-align:center}
  .cbcell{text-align:center}
  col.c-chk{width:34px} col.c-tgl{width:60px} col.c-sj{width:120px} col.c-dist{width:130px}
  col.c-exp{width:50px} col.c-truck{width:80px} col.c-cont{width:90px} col.c-m3{width:44px} col.c-rate{width:90px}
  col.c-hm{width:90px} col.c-ket{width:110px}
  .empty{text-align:center;color:var(--muted);padding:34px 12px}
  .config{font-size:12px;color:var(--muted)}
  .config summary{cursor:pointer;font-weight:600;color:var(--accent)}
  .config input{font-size:13px;margin-top:6px}
  .toolbar{display:flex;gap:8px;margin-bottom:10px}
  .toolbar .btn{padding:10px;font-size:13px}
  .selbar{position:fixed;left:0;right:0;bottom:0;background:var(--ink);color:#fff;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;gap:10px;transform:translateY(100%);transition:.2s;z-index:50}
  .selbar.show{transform:translateY(0)}
  .selbar .info{font-size:13px}
  .selbar .info b{display:block;font-size:16px}
  .selbar button{padding:11px 16px;border:none;border-radius:9px;background:var(--gold);color:#fff;font-weight:700;font-size:14px;cursor:pointer;white-space:nowrap}
  datalist{display:none}
  #printArea{display:none}
  @page{ size:A4 landscape; margin:12mm; }
  @media print{
    body *{visibility:hidden}
    #printArea,#printArea *{visibility:visible}
    #printArea{display:block;position:absolute;left:0;top:0;width:100%}
    .no-print{display:none!important}
  }
  #printArea{background:#fff;color:#000;font-size:12px}
  .p-head{text-align:center;border-bottom:2px solid #000;padding-bottom:8px;margin-bottom:10px}
  .p-head h2{margin:0;font-size:18px;letter-spacing:.5px} .p-head p{margin:2px 0;font-size:12px}
  .p-meta{display:flex;justify-content:space-between;font-size:11.5px;margin-bottom:10px}
  table{width:100%;border-collapse:collapse;font-size:11px}
  th,td{border:1px solid #888;padding:5px 7px;text-align:left;vertical-align:top}
  th{background:#e9e9e9;font-size:10.5px;text-transform:uppercase;letter-spacing:.3px}
  td.r,th.r{text-align:right}
  td.c,th.c{text-align:center}
  tfoot td{font-weight:800;background:#f3f3f3}
  .p-sign{margin-top:40px;display:flex;justify-content:space-around;font-size:11.5px}
  .p-sign div{text-align:center;width:40%}
  .p-sign .role{margin-bottom:56px}
  .p-sign .nm{letter-spacing:1px}
  td.pairs{padding:0}
  .pair{display:flex;border-bottom:1px solid #ddd}
  .pair:last-child{border-bottom:none}
  .pair span{padding:3px 6px}
  .pair .a{flex:2;border-right:1px solid #ddd}
  .pair .b{flex:2;border-right:1px solid #ddd}
  .pair .c{flex:1;text-align:right}
  .pair.phead{font-weight:700;background:#f0f0f0;font-size:9.5px}
  .pair.psub{font-weight:700;background:#fafafa;font-size:9.5px}
  td small{color:#666;font-size:10px}
</style>
</head>
<body>
<header>
  <h1>Cari Surat Jalan</h1>
  <p>Filter → centang → simpan → cetak dengan total harga</p>
</header>

<div class="wrap no-print">
  <div class="panel">
    <div class="field">
      <label>Nama Ekspedisi</label>
      <select id="exp"><option value="">— Semua —</option></select>
    </div>
    <div class="field">
      <label>Rentang Tanggal Kirim</label>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="date" id="tglDari" style="flex:1">
        <span style="color:var(--muted);font-size:13px">s/d</span>
        <input type="date" id="tglSampai" style="flex:1">
      </div>
      <small style="color:var(--muted);font-size:11px">Kosongkan keduanya = semua tanggal</small>
    </div>
    <div class="field">
      <label>Nama Distributor (opsional)</label>
      <input id="dist" list="distList" placeholder="Kosongkan utk tampil semua…" autocomplete="off">
      <datalist id="distList"></datalist>
    </div>
    <div class="field">
      <label>No Invoice Ekspedisi (opsional, utk cetak)</label>
      <input id="noInv" placeholder="mis. INV/KKL/2026/001" autocomplete="off">
    </div>
    <button class="btn" id="cari">Cari</button>
    <div class="status" id="status">Memuat data…</div>
  </div>

  <details class="panel config">
    <summary>Pengaturan sumber data</summary>
    <div style="margin-top:10px">
      <label>ID Google Sheet</label>
      <input id="sid" value="1RFH2UALr_IM_epOBotEt7UDeudRH71D_Kc7-vE_dzgw">
      <label style="margin-top:8px">GID sheet (pisahkan koma untuk gabung)</label>
      <input id="gid" value="1537494998">
      <button class="btn btn-sec" id="reload" style="margin-top:10px">Muat Ulang Data</button>
      <label style="margin-top:12px">URL Apps Script (utk simpan ke Sheet)</label>
      <input id="scriptUrl" placeholder="https://script.google.com/macros/s/.../exec" autocomplete="off">
    </div>
  </details>

  <div id="results"></div>
</div>

<div class="selbar no-print" id="selbar">
  <div class="info">Dipilih <b id="selCount">0</b></div>
  <div style="display:flex;gap:8px">
    <button id="clearSel" style="background:#555">Batal</button>
    <button id="printSel">Simpan &amp; Cetak</button>
  </div>
</div>

<div id="printArea"></div>

<script>
const $=id=>document.getElementById(id);
let ROWS=[], VIEW=[];
const SEL=new Map();
const MANUAL={}; // {contKey:{harga,ket}}

function fmtRp(n){return n>0?'Rp '+Math.round(n).toLocaleString('id-ID'):null;}
function toNum(v){
  if(v==null||v==='')return 0;
  if(typeof v==='number')return v;
  let s=String(v).replace(/[^0-9,.-]/g,'');
  if(s==='')return 0;
  const hasDot=s.includes('.'), hasComma=s.includes(',');
  if(hasDot&&hasComma){
    // format ID: titik=ribuan, koma=desimal → 1.234.567,89
    s=s.replace(/\./g,'').replace(',','.');
  }else if(hasComma){
    // hanya koma: desimal ID (71,80) ATAU ribuan gaya EN
    if(/,\d{1,2}$/.test(s)) s=s.replace(',', '.');   // desimal
    else s=s.replace(/,/g,'');                        // ribuan
  }else if(hasDot){
    // hanya titik: bisa ribuan ID (8.551.802) atau desimal EN (8551.80)
    const parts=s.split('.');
    if(parts.length>2) s=s.replace(/\./g,'');         // >1 titik = ribuan ID
    else if(parts[1] && parts[1].length===3) s=s.replace(/\./g,''); // 1 titik & 3 digit = ribuan (8.551)
    // selain itu biarkan sbg desimal
  }
  const n=parseFloat(s);return isNaN(n)?0:n;
}
function setStatus(m,c){$('status').textContent=m;$('status').className='status'+(c?' '+c:'');}

async function fetchTimeout(url,ms){
  const ctrl=new AbortController();const id=setTimeout(()=>ctrl.abort(),ms);
  try{return await fetch(url,{signal:ctrl.signal});}finally{clearTimeout(id);}
}

async function fetchOneGid(sid,gid){
  const csv=`https://docs.google.com/spreadsheets/d/${sid}/export?format=csv&gid=${gid}`;
  const tries=[
    csv,
    `https://docs.google.com/spreadsheets/d/${sid}/gviz/tq?tqx=out:csv&gid=${gid}`,
    'https://api.allorigins.win/raw?url='+encodeURIComponent(csv),
  ];
  for(const url of tries){
    try{
      const res=await fetchTimeout(url,12000);
      if(!res.ok)throw 0;
      const text=await res.text();
      if(!text||text.trim().startsWith('<'))throw 0;
      const p=Papa.parse(text,{skipEmptyLines:true});
      if(p.data&&p.data.length>1)return p.data;
    }catch(e){}
  }
  return null;
}

async function loadData(){
  const sid=$('sid').value.trim();
  const gids=$('gid').value.split(',').map(s=>s.trim()).filter(Boolean);
  setStatus('Memuat data dari '+gids.length+' sheet…');
  let all=[]; let okCount=0; let rawSample=null;
  for(const gid of gids){
    setStatus('Memuat sheet gid='+gid+'…');
    const data=await fetchOneGid(sid,gid);
    if(data){ if(!rawSample)rawSample=data; all=all.concat(parseSheet(data)); okCount++; }
  }
  if(!okCount){
    setStatus('Gagal memuat. Buka lewat GitHub Pages (https), bukan file lokal.','err');
    return;
  }
  ROWS=all.map((r,i)=>({...r,id:'r'+i}));
  buildFilters();
  if(!ROWS.length){
    setStatus('Terhubung tapi 0 baris terbaca — lihat contoh data di bawah.','err');
    showRaw(rawSample);
  } else setStatus(ROWS.length+' baris dari '+okCount+' sheet dimuat. Siap dicari.','ok');
}

function showRaw(data){
  if(!data){return;}
  let html='<div class="panel"><b>Diagnosa — 8 baris pertama sheet:</b><div style="overflow-x:auto;margin-top:8px"><table style="font-size:11px;border-collapse:collapse">';
  for(let i=0;i<Math.min(8,data.length);i++){
    html+='<tr>';
    html+='<td style="border:1px solid #ccc;padding:3px;background:#eee;font-weight:700">'+i+'</td>';
    for(let j=0;j<Math.min(10,data[i].length);j++){
      html+='<td style="border:1px solid #ccc;padding:3px;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis">'+(data[i][j]||'')+'</td>';
    }
    html+='</tr>';
  }
  html+='</table></div><p style="font-size:12px;color:#8b8072;margin-top:8px">Kirim screenshot tabel ini supaya pemetaan kolom bisa disesuaikan.</p></div>';
  $('results').innerHTML=html;
}

function findCol(headers, keywords){
  for(let i=0;i<headers.length;i++){
    const h=String(headers[i]||'').toLowerCase().trim();
    for(const kw of keywords){ if(h.includes(kw)) return i; }
  }
  return -1;
}

function findLastCol(headers, keywords){
  for(let i=headers.length-1;i>=0;i--){
    const h=String(headers[i]||'').toLowerCase().trim();
    for(const kw of keywords){ if(h.includes(kw)) return i; }
  }
  return -1;
}

function parseSheet(data){
  // cari baris header
  let hIdx=-1;
  for(let i=0;i<Math.min(data.length,20);i++){
    const j=data[i].join('|').toLowerCase();
    if(j.includes('packing slip')||j.includes('surat jalan')||j.includes('no do')||(j.includes('rate')&&j.includes('distributor'))||(j.includes('expedition')&&j.includes('container'))){hIdx=i;break;}
  }
  if(hIdx<0) return [];
  const H=data[hIdx];
  // petakan kolom berdasarkan nama header (ID + EN)
  const cExp = findCol(H,['expedition','ekspedisi','expedisi','ekpedisi']);
  const cNopol=findCol(H,['truck','nopol','no pol','polisi']);
  const cTgl = findCol(H,['ship date','tgl kirim','tanggal kirim','tgl','tanggal']);
  const cDist= findCol(H,['distributor','distri','customer','pelanggan']);
  const cCont= findCol(H,['container','kontainer','cont']);
  // Rate = kolom K (indeks 10) sesuai struktur sheet; fallback cari header 'rate' paling kanan
  let cRate = 10;
  if(!H[10] || !String(H[10]).toLowerCase().includes('rate')){
    cRate = findLastCol(H,['rate','harga','tarif','biaya','nominal']);
  }
  const cSo  = findCol(H,['sales order','no so','nomor so']);
  const cSj  = findCol(H,['packing slip','surat jalan','no sj','delivery order','no do']);
  const cM3  = findCol(H,['m3','m³','kubikasi','kubik','cbm','volume']);

  const g=(c,idx)=> (idx>=0 && c[idx]!=null) ? String(c[idx]).trim() : '';
  const raw=[];
  let lastExp='';
  for(let i=hIdx+1;i<data.length;i++){
    const c=data[i];if(!c)continue;
    let exp=g(c,cExp);
    const nopol=g(c,cNopol);
    const tgl=g(c,cTgl);
    const dist=g(c,cDist);
    const cont=g(c,cCont);
    const rate=toNum(g(c,cRate));
    const so=g(c,cSo);
    const sj=g(c,cSj);
    const m3=toNum(g(c,cM3));
    if(!sj)continue;
    if(exp){lastExp=exp;}else{exp=lastExp;}
    raw.push({exp,nopol,tgl,dist,cont,rate,so,sj,m3});
  }
  // tahap 2: kumpulkan rate per kontainer (nopol+exp+tgl+cont), lalu tempel ke semua baris
  const rateMap={};
  raw.forEach(r=>{
    const k=r.nopol+'|'+r.exp+'|'+r.tgl+'|'+r.cont;
    if(r.rate>0 && !rateMap[k]) rateMap[k]=r.rate;
  });
  raw.forEach(r=>{
    const k=r.nopol+'|'+r.exp+'|'+r.tgl+'|'+r.cont;
    r.contKey=k;
    if(!(r.rate>0) && rateMap[k]) r.rate=rateMap[k];
  });
  return raw;
}

function buildFilters(){
  const exps=[...new Set(ROWS.map(r=>r.exp).filter(Boolean))].sort();
  const dists=[...new Set(ROWS.map(r=>r.dist).filter(Boolean))].sort();
  $('exp').innerHTML='<option value="">— Semua —</option>'+exps.map(e=>`<option>${e}</option>`).join('');
  $('distList').innerHTML=dists.map(d=>`<option value="${d.replace(/"/g,'&quot;')}">`).join('');
}

// parse "dd/mm/yy" atau "dd/mm/yyyy" -> Date (00:00)
function parseTgl(s){
  if(!s)return null;
  const m=String(s).trim().match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})$/);
  if(!m)return null;
  let[,d,mo,y]=m; d=+d;mo=+mo;y=+y;
  if(y<100)y+=2000;
  const dt=new Date(y,mo-1,d);
  return isNaN(dt)?null:dt;
}

function cari(){
  const e=$('exp').value;
  const d=$('dist').value.trim().toLowerCase();
  const dari=$('tglDari').value?new Date($('tglDari').value):null;
  const sampai=$('tglSampai').value?new Date($('tglSampai').value):null;
  if(sampai)sampai.setHours(23,59,59);
  VIEW=ROWS.filter(r=>{
    if(e&&r.exp!==e)return false;
    if(d&&!r.dist.toLowerCase().includes(d))return false;
    if(dari||sampai){
      const rt=parseTgl(r.tgl);
      if(!rt)return false;
      if(dari&&rt<dari)return false;
      if(sampai&&rt>sampai)return false;
    }
    return true;
  });
  render();
}

function render(){
  const box=$('results');
  if(!VIEW.length){box.innerHTML='<div class="panel empty">Tidak ada surat jalan yang cocok.</div>';return;}
  const seen=new Set();let total=0;
  VIEW.forEach(r=>{if(r.rate>0&&!seen.has(r.contKey)){seen.add(r.contKey);total+=r.rate;}});
  let html=`<div class="res-head"><h2>Hasil Pencarian</h2><span class="cnt">${VIEW.length} surat jalan</span></div>`;
  html+=`<div class="toolbar">
    <button class="btn btn-sec" id="selAll">Centang Semua</button>
    <button class="btn btn-sec" id="unAll">Hapus Centang</button>
  </div>`;
  if(total>0)html+=`<div class="total"><span>Total harga hasil (per kontainer)</span><b>${fmtRp(total)}</b></div>`;
  const seenCont=new Set();
  const rows=VIEW.map(r=>{
    const on=SEL.has(r.id);
    const firstOfCont=!seenCont.has(r.contKey); if(firstOfCont)seenCont.add(r.contKey);
    const mv=MANUAL[r.contKey]||{harga:'',ket:''};
    const inputCells = firstOfCont
      ? `<td class="editcell"><input class="in-harga" data-k="${r.contKey}" inputmode="numeric" value="${mv.harga||''}" placeholder="—"></td>
         <td class="editcell"><input class="in-ket" data-k="${r.contKey}" value="${(mv.ket||'').replace(/"/g,'&quot;')}" placeholder="—"></td>`
      : `<td class="editcell muted2">˝</td><td class="editcell muted2">˝</td>`;
    return `<tr class="rrow ${on?'sel':''}" data-id="${r.id}">
      <td class="cbcell"><input type="checkbox" class="chk" ${on?'checked':''}></td>
      <td>${r.tgl||'—'}</td>
      <td class="sj">${r.sj}<br><span class="so">${r.so||'—'}</span></td>
      <td>${r.dist||'—'}</td>
      <td>${r.exp||'—'}</td>
      <td>${r.nopol||'—'}</td>
      <td>${r.cont||'—'}</td>
      <td class="m3">${r.m3>0?r.m3.toLocaleString('id-ID'):'—'}</td>
      <td class="rate ${r.rate>0?'':'none'}">${r.rate>0?fmtRp(r.rate):'(ikut)'}</td>
      ${inputCells}
    </tr>`;
  }).join('');
  html+=`<div class="tblwrap"><table class="restbl">
    <colgroup><col class="c-chk"><col class="c-tgl"><col class="c-sj"><col class="c-dist"><col class="c-exp"><col class="c-truck"><col class="c-cont"><col class="c-m3"><col class="c-rate"><col class="c-hm"><col class="c-ket"></colgroup>
    <thead><tr>
      <th class="cbcell"><input type="checkbox" id="chkAllHead"></th>
      <th>Tgl</th><th>No Surat Jalan / SO</th><th>Distributor</th><th>Eksp</th><th>No Truck</th><th>No Kontainer</th><th class="m3">m³</th><th class="rate">Harga</th><th>Harga Manual</th><th>Keterangan</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
  box.innerHTML=html;

  box.querySelectorAll('.rrow').forEach(row=>{
    const id=row.dataset.id;
    const cb=row.querySelector('.chk');
    const toggle=()=>{
      if(cb.checked){SEL.set(id,VIEW.find(r=>r.id===id));row.classList.add('sel');}
      else{SEL.delete(id);row.classList.remove('sel');}
      updateSelbar();
    };
    cb.addEventListener('change',toggle);
    row.addEventListener('click',e=>{
      const t=e.target;
      if(t!==cb && !t.classList.contains('in-harga') && !t.classList.contains('in-ket')){cb.checked=!cb.checked;toggle();}
    });
  });
  // simpan input harga manual & keterangan ke MANUAL (per kontainer)
  box.querySelectorAll('.in-harga').forEach(inp=>{
    inp.addEventListener('input',()=>{ const k=inp.dataset.k; MANUAL[k]=MANUAL[k]||{}; MANUAL[k].harga=inp.value; });
  });
  box.querySelectorAll('.in-ket').forEach(inp=>{
    inp.addEventListener('input',()=>{ const k=inp.dataset.k; MANUAL[k]=MANUAL[k]||{}; MANUAL[k].ket=inp.value; });
  });
  const head=$('chkAllHead');
  if(head){head.checked=VIEW.every(r=>SEL.has(r.id))&&VIEW.length>0;
    head.onclick=()=>{ if(head.checked)VIEW.forEach(r=>SEL.set(r.id,r)); else VIEW.forEach(r=>SEL.delete(r.id)); render(); };
  }
  $('selAll').onclick=()=>{VIEW.forEach(r=>SEL.set(r.id,r));render();};
  $('unAll').onclick=()=>{VIEW.forEach(r=>SEL.delete(r.id));render();};
  updateSelbar();
}

function updateSelbar(){
  $('selCount').textContent=SEL.size;
  $('selbar').classList.toggle('show',SEL.size>0);
}

// hasilkan struktur data rekap dari yang dipilih
function buildRekap(){
  const rows=[...SEL.values()];
  const groups={};
  rows.forEach(r=>{
    const k=r.contKey||(r.nopol+'|'+r.exp+'|'+r.tgl+'|'+r.cont);
    if(!groups[k]) groups[k]={nopol:r.nopol,exp:r.exp,tgl:r.tgl,cont:r.cont,dist:r.dist,rate:r.rate||0,items:[],seenSj:new Set()};
    const gg=groups[k];
    if(r.rate>0) gg.rate=r.rate;
    if(r.sj && !gg.seenSj.has(r.sj)){ gg.seenSj.add(r.sj); gg.items.push({sj:r.sj,so:r.so,m3:r.m3||0}); }
    if(!gg.dist && r.dist) gg.dist=r.dist;
  });
  const list=Object.values(groups).filter(g=>g.rate>0).map(g=>{
    delete g.seenSj;
    const k=g.nopol+'|'+g.exp+'|'+g.tgl+'|'+g.cont;
    const mv=MANUAL[k]||{};
    const hm=toNum(mv.harga);
    g.hargaManual = hm>0?hm:null;
    g.keterangan = (mv.ket||'').trim();
    g.hargaFinal = hm>0?hm:g.rate;
    return g;
  });
  const total=list.reduce((s,g)=>s+(g.hargaFinal||g.rate),0);
  const totalM3=list.reduce((s,g)=>s+g.items.reduce((a,it)=>a+(it.m3||0),0),0);
  const skipped=Object.values(groups).length-list.length;
  const noInv=$('noInv').value.trim();
  const dari=$('tglDari').value, sampai=$('tglSampai').value;
  const fmtD=s=>{const d=new Date(s);return d.toLocaleDateString('id-ID',{day:'2-digit',month:'2-digit',year:'numeric'});};
  let periode='';
  if(dari&&sampai)periode=fmtD(dari)+' s/d '+fmtD(sampai);
  else if(dari)periode='mulai '+fmtD(dari);
  else if(sampai)periode='s/d '+fmtD(sampai);
  return {list,total,totalM3,skipped,noInv,periode,dibuat:new Date().toISOString()};
}

const fmtM3=n=>n>0?n.toLocaleString('id-ID',{maximumFractionDigits:2}):'—';

function buildPrint(rekap){
  const {list,totalM3,skipped,noInv,periode}=rekap;
  const today=new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'});
  let totalFinal=0;
  const body=list.map((g,i)=>{
    const subM3=g.items.reduce((a,it)=>a+(it.m3||0),0);
    const spa=g.items.map(it=>it.sj).filter(Boolean).join(', ');
    const so=[...new Set(g.items.map(it=>it.so).filter(Boolean))].join(', ');
    const hFinal=(g.hargaFinal!=null?g.hargaFinal:g.rate);
    totalFinal+=hFinal;
    const adaManual=(g.hargaManual!=null && g.hargaManual>0 && g.hargaManual!==g.rate);
    return `<tr>
      <td class="c">${i+1}</td>
      <td>${g.dist||'—'}</td>
      <td>${g.exp||'—'}</td>
      <td>${g.nopol||'—'}<br><small>${g.cont||''}</small></td>
      <td>${g.tgl||'—'}</td>
      <td>${spa||'—'}</td>
      <td>${so||'—'}</td>
      <td class="r">${fmtM3(subM3)}</td>
      <td class="r">${fmtRp(g.rate)}</td>
      <td class="r">${adaManual?fmtRp(g.hargaManual):''}</td>
      <td>${g.keterangan||''}</td>
    </tr>`;
  }).join('');

  $('printArea').innerHTML=`
    <div class="p-head">
      <p>PT. UNIFAM</p>
    </div>
    <div class="p-meta">
      <div>
        ${noInv?'<div><b>No Invoice Ekspedisi:</b> '+noInv+'</div>':''}
        ${periode?'<div><b>Periode kirim:</b> '+periode+'</div>':''}
        <div>Tanggal cetak: ${today}</div>
      </div>
      <div style="text-align:right">Jumlah truck: ${list.length}</div>
    </div>
    <table>
      <thead><tr>
        <th class="c" style="width:26px">No</th><th style="width:150px">Distributor</th><th style="width:52px">Eksp</th><th style="width:110px">No Truck / Kontainer</th><th style="width:62px">Tgl</th><th>No Surat Jalan</th><th>No SO</th><th class="r" style="width:48px">m³</th><th class="r" style="width:92px">Harga</th><th class="r" style="width:92px">Harga Manual</th><th style="width:110px">Keterangan</th>
      </tr></thead>
      <tbody>${body}</tbody>
      <tfoot><tr><td colspan="7" class="r">TOTAL</td><td class="r">${fmtM3(totalM3)}</td><td class="r" colspan="2">${fmtRp(totalFinal)||'Rp 0'}</td><td></td></tr></tfoot>
    </table>
    ${skipped>0?`<p style="font-size:11px;color:#666;margin-top:6px">*) ${skipped} truck terpilih tidak dicetak karena belum ada harga.</p>`:''}
    <div class="p-sign">
      <div><div class="role">Diperiksa oleh,</div><div class="nm">(&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;)</div></div>
      <div><div class="role">Mengetahui,</div><div class="nm">(&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;)</div></div>
    </div>`;
}

// ===== SIMPAN KE GOOGLE SHEET (via Apps Script) =====
function kirimKeSheet(rekap){
  const url=($('scriptUrl').value||'').trim();
  if(!url) return false;
  try{ localStorage.setItem('script_url_unifam', url); }catch(e){}
  fetch(url,{
    method:'POST',
    mode:'no-cors',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify(rekap)
  }).catch(()=>{});
  return true;
}

$('cari').onclick=cari;
$('dist').addEventListener('keydown',e=>{if(e.key==='Enter')cari();});
$('reload').onclick=loadData;
$('clearSel').onclick=()=>{SEL.clear();render();updateSelbar();};
$('printSel').onclick=()=>{
  if(!SEL.size)return;
  const rekap=buildRekap();
  if(!rekap.list.length){alert('Tidak ada kontainer dengan harga untuk disimpan/dicetak.');return;}
  const terkirim=kirimKeSheet(rekap);
  if(!terkirim){
    if(!confirm('URL Apps Script belum diisi, jadi rekap TIDAK tersimpan ke Google Sheet.\nLanjut cetak saja?')) return;
  }
  buildPrint(rekap);
  setTimeout(()=>{
    const judulAsli=document.title;
    document.title=' ';
    window.print();
    document.title=judulAsli;
    if(terkirim){ setTimeout(()=>{ SEL.clear(); render(); updateSelbar(); },300); }
  },150);
};
// pulihkan URL script tersimpan
try{ const u=localStorage.getItem('script_url_unifam'); if(u)$('scriptUrl').value=u; }catch(e){}
loadData();
</script>
