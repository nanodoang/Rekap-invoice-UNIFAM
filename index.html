<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cari Surat Jalan</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root{
    --ink:#16130f; --paper:#f6f2ea; --card:#fffdf8;
    --line:#e2dacb; --muted:#8b8072;
    --accent:#1f6f8b; --accent-bg:#e7f1f4;
    --gold:#b8841a; --gold-bg:#fbf2dd;
    --ok:#2f7d4f; --ok-bg:#e7f3eb;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:-apple-system,Segoe UI,Roboto,sans-serif;font-size:15px;line-height:1.45;padding-bottom:80px}
  header{padding:16px;border-bottom:2px solid var(--ink);background:var(--card)}
  header h1{margin:0;font-size:19px;letter-spacing:-.3px}
  header p{margin:3px 0 0;color:var(--muted);font-size:12.5px}
  .wrap{padding:14px;max-width:760px;margin:0 auto}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:14px}
  label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin:0 0 4px}
  select,input{width:100%;padding:11px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);font-family:inherit;font-size:15px}
  .field{margin-bottom:11px}
  .btn{width:100%;padding:13px;border:none;border-radius:10px;background:var(--ink);color:var(--paper);font-weight:700;font-size:15px;cursor:pointer}
  .btn-sec{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .status{font-size:12.5px;color:var(--muted);text-align:center;padding:6px;word-break:break-word}
  .status.err{color:#c0392b} .status.ok{color:var(--ok)}
  .res-head{display:flex;justify-content:space-between;align-items:center;margin:4px 0 10px;gap:8px}
  .res-head h2{margin:0;font-size:15px}
  .res-head .cnt{font-size:12px;color:var(--muted)}
  .total{background:var(--accent-bg);border:1px solid #cfe2e8;border-radius:10px;padding:11px 13px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
  .total b{color:var(--accent);font-size:19px}
  .total span{font-size:12.5px;color:var(--muted)}
  .card{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:10px;padding:12px;margin-bottom:9px;display:flex;gap:10px;align-items:flex-start}
  .card.sel{border-left-color:var(--ok);background:var(--ok-bg)}
  .chk{width:22px;height:22px;flex:none;margin-top:2px;accent-color:var(--ok)}
  .card-body{flex:1;min-width:0}
  .sj{font-weight:800;font-size:16px;letter-spacing:.3px}
  .dist{font-size:13px;color:var(--ink);margin:3px 0 8px}
  .meta{display:flex;flex-wrap:wrap;gap:10px 16px;font-size:13px}
  .meta div b{display:block;font-size:10.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
  .rate{color:var(--gold);font-weight:700}
  .rate.none{color:var(--muted);font-weight:400}
  .empty{text-align:center;color:var(--muted);padding:34px 12px}
  .config{font-size:12px;color:var(--muted)}
  .config summary{cursor:pointer;font-weight:600;color:var(--accent)}
  .config input{font-size:13px;margin-top:6px}
  .toolbar{display:flex;gap:8px;margin-bottom:10px}
  .toolbar .btn{padding:10px;font-size:13px}
  .selbar{position:fixed;left:0;right:0;bottom:0;background:var(--ink);color:#fff;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;gap:10px;transform:translateY(100%);transition:.2s;z-index:50}
  .selbar.show{transform:translateY(0)}
  .selbar .info{font-size:13px}
  .selbar .info b{display:block;font-size:16px}
  .selbar button{padding:11px 16px;border:none;border-radius:9px;background:var(--gold);color:#fff;font-weight:700;font-size:14px;cursor:pointer;white-space:nowrap}
  datalist{display:none}
  #printArea{display:none}
  @media print{
    body *{visibility:hidden}
    #printArea,#printArea *{visibility:visible}
    #printArea{display:block;position:absolute;left:0;top:0;width:100%;padding:20px}
    .no-print{display:none!important}
  }
  #printArea{background:#fff;color:#000;font-size:13px}
  .p-head{text-align:center;border-bottom:2px solid #000;padding-bottom:10px;margin-bottom:14px}
  .p-head h2{margin:0;font-size:20px} .p-head p{margin:2px 0;font-size:12px}
  .p-meta{display:flex;justify-content:space-between;font-size:12px;margin-bottom:10px}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th,td{border:1px solid #999;padding:6px 8px;text-align:left}
  th{background:#eee}
  td.r,th.r{text-align:right}
  tfoot td{font-weight:800;background:#f3f3f3}
  .p-sign{margin-top:40px;display:flex;justify-content:space-between;font-size:12px}
  .p-sign div{text-align:center;width:40%}
  .p-sign .line{margin-top:50px;border-top:1px solid #000;padding-top:4px}
  td.pairs{padding:0}
  .pair{display:flex;border-bottom:1px solid #ddd}
  .pair:last-child{border-bottom:none}
  .pair span{flex:1;padding:3px 6px}
  .pair span:first-child{border-right:1px solid #ddd}
  .pair.phead{font-weight:700;background:#f0f0f0;font-size:10px}
  td small{color:#666;font-size:10px}
</style>
</head>
<body>
<header>
  <h1>Cari Surat Jalan</h1>
  <p>Filter → centang → simpan → cetak dengan total harga</p>
</header>

<div class="wrap no-print">
  <div class="panel">
    <div class="field">
      <label>Nama Ekspedisi</label>
      <select id="exp"><option value="">— Semua —</option></select>
    </div>
    <div class="field">
      <label>Tanggal Kirim</label>
      <select id="tgl"><option value="">— Semua tanggal —</option></select>
    </div>
    <div class="field">
      <label>Nama Distributor (opsional)</label>
      <input id="dist" list="distList" placeholder="Kosongkan utk tampil semua…" autocomplete="off">
      <datalist id="distList"></datalist>
    </div>
    <button class="btn" id="cari">Cari</button>
    <div class="status" id="status">Memuat data…</div>
  </div>

  <details class="panel config">
    <summary>Pengaturan sumber data</summary>
    <div style="margin-top:10px">
      <label>ID Google Sheet</label>
      <input id="sid" value="1RFH2UALr_IM_epOBotEt7UDeudRH71D_Kc7-vE_dzgw">
      <label style="margin-top:8px">GID sheet (pisahkan koma untuk gabung)</label>
      <input id="gid" value="1537494998">
      <button class="btn btn-sec" id="reload" style="margin-top:10px">Muat Ulang Data</button>
    </div>
  </details>

  <div id="results"></div>
</div>

<div class="selbar no-print" id="selbar">
  <div class="info">Dipilih <b id="selCount">0</b></div>
  <div style="display:flex;gap:8px">
    <button id="clearSel" style="background:#555">Batal</button>
    <button id="printSel">Simpan &amp; Cetak</button>
  </div>
</div>

<div id="printArea"></div>

<script>
const $=id=>document.getElementById(id);
let ROWS=[], VIEW=[];
const SEL=new Map();

function fmtRp(n){return n>0?'Rp '+Math.round(n).toLocaleString('id-ID'):null;}
function toNum(v){
  if(v==null||v==='')return 0;
  if(typeof v==='number')return v;
  let s=String(v).replace(/[^0-9,.-]/g,'');
  if(/,\d{1,2}$/.test(s))s=s.replace(/\./g,'').replace(',','.');else s=s.replace(/,/g,'');
  const n=parseFloat(s);return isNaN(n)?0:n;
}
function setStatus(m,c){$('status').textContent=m;$('status').className='status'+(c?' '+c:'');}

async function fetchTimeout(url,ms){
  const ctrl=new AbortController();const id=setTimeout(()=>ctrl.abort(),ms);
  try{return await fetch(url,{signal:ctrl.signal});}finally{clearTimeout(id);}
}

async function fetchOneGid(sid,gid){
  const csv=`https://docs.google.com/spreadsheets/d/${sid}/export?format=csv&gid=${gid}`;
  const tries=[
    csv,
    `https://docs.google.com/spreadsheets/d/${sid}/gviz/tq?tqx=out:csv&gid=${gid}`,
    'https://api.allorigins.win/raw?url='+encodeURIComponent(csv),
  ];
  for(const url of tries){
    try{
      const res=await fetchTimeout(url,12000);
      if(!res.ok)throw 0;
      const text=await res.text();
      if(!text||text.trim().startsWith('<'))throw 0;
      const p=Papa.parse(text,{skipEmptyLines:true});
      if(p.data&&p.data.length>1)return p.data;
    }catch(e){}
  }
  return null;
}

async function loadData(){
  const sid=$('sid').value.trim();
  const gids=$('gid').value.split(',').map(s=>s.trim()).filter(Boolean);
  setStatus('Memuat data dari '+gids.length+' sheet…');
  let all=[]; let okCount=0; let rawSample=null;
  for(const gid of gids){
    setStatus('Memuat sheet gid='+gid+'…');
    const data=await fetchOneGid(sid,gid);
    if(data){ if(!rawSample)rawSample=data; all=all.concat(parseSheet(data)); okCount++; }
  }
  if(!okCount){
    setStatus('Gagal memuat. Buka lewat GitHub Pages (https), bukan file lokal.','err');
    return;
  }
  ROWS=all.map((r,i)=>({...r,id:'r'+i}));
  buildFilters();
  if(!ROWS.length){
    setStatus('Terhubung tapi 0 baris terbaca — lihat contoh data di bawah.','err');
    showRaw(rawSample);
  } else setStatus(ROWS.length+' baris dari '+okCount+' sheet dimuat. Siap dicari.','ok');
}

function showRaw(data){
  if(!data){return;}
  let html='<div class="panel"><b>Diagnosa — 8 baris pertama sheet:</b><div style="overflow-x:auto;margin-top:8px"><table style="font-size:11px;border-collapse:collapse">';
  for(let i=0;i<Math.min(8,data.length);i++){
    html+='<tr>';
    html+='<td style="border:1px solid #ccc;padding:3px;background:#eee;font-weight:700">'+i+'</td>';
    for(let j=0;j<Math.min(10,data[i].length);j++){
      html+='<td style="border:1px solid #ccc;padding:3px;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis">'+(data[i][j]||'')+'</td>';
    }
    html+='</tr>';
  }
  html+='</table></div><p style="font-size:12px;color:#8b8072;margin-top:8px">Kirim screenshot tabel ini supaya pemetaan kolom bisa disesuaikan.</p></div>';
  $('results').innerHTML=html;
}

function findCol(headers, keywords){
  for(let i=0;i<headers.length;i++){
    const h=String(headers[i]||'').toLowerCase().trim();
    for(const kw of keywords){ if(h.includes(kw)) return i; }
  }
  return -1;
}

function parseSheet(data){
  // cari baris header
  let hIdx=-1;
  for(let i=0;i<Math.min(data.length,20);i++){
    const j=data[i].join('|').toLowerCase();
    if(j.includes('packing slip')||j.includes('surat jalan')||j.includes('no do')||(j.includes('rate')&&j.includes('distributor'))||(j.includes('expedition')&&j.includes('container'))){hIdx=i;break;}
  }
  if(hIdx<0) return [];
  const H=data[hIdx];
  // petakan kolom berdasarkan nama header (ID + EN)
  const cExp = findCol(H,['expedition','ekspedisi','expedisi','ekpedisi']);
  const cNopol=findCol(H,['truck','nopol','no pol','polisi']);
  const cTgl = findCol(H,['ship date','tgl kirim','tanggal kirim','tgl','tanggal']);
  const cDist= findCol(H,['distributor','distri','customer','pelanggan']);
  const cCont= findCol(H,['container','kontainer','cont']);
  const cRate= findCol(H,['rate','harga','tarif','biaya','nominal']);
  const cSo  = findCol(H,['sales order','no so','nomor so']);
  const cSj  = findCol(H,['packing slip','surat jalan','no sj','delivery order','no do']);

  const g=(c,idx)=> (idx>=0 && c[idx]!=null) ? String(c[idx]).trim() : '';
  const raw=[];
  let lastExp='';
  for(let i=hIdx+1;i<data.length;i++){
    const c=data[i];if(!c)continue;
    let exp=g(c,cExp);
    const nopol=g(c,cNopol);
    const tgl=g(c,cTgl);
    const dist=g(c,cDist);
    const cont=g(c,cCont);
    const rate=toNum(g(c,cRate));
    const so=g(c,cSo);
    const sj=g(c,cSj);
    if(!sj)continue;
    if(exp){lastExp=exp;}else{exp=lastExp;}
    raw.push({exp,nopol,tgl,dist,cont,rate,so,sj});
  }
  // tahap 2: kumpulkan rate per kontainer (nopol+exp+tgl+cont), lalu tempel ke semua baris
  const rateMap={};
  raw.forEach(r=>{
    const k=r.nopol+'|'+r.exp+'|'+r.tgl+'|'+r.cont;
    if(r.rate>0 && !rateMap[k]) rateMap[k]=r.rate;
  });
  raw.forEach(r=>{
    const k=r.nopol+'|'+r.exp+'|'+r.tgl+'|'+r.cont;
    r.contKey=k;
    if(!(r.rate>0) && rateMap[k]) r.rate=rateMap[k];
  });
  return raw;
}

function buildFilters(){
  const exps=[...new Set(ROWS.map(r=>r.exp).filter(Boolean))].sort();
  const tgls=[...new Set(ROWS.map(r=>r.tgl).filter(Boolean))];
  const dists=[...new Set(ROWS.map(r=>r.dist).filter(Boolean))].sort();
  $('exp').innerHTML='<option value="">— Semua —</option>'+exps.map(e=>`<option>${e}</option>`).join('');
  $('tgl').innerHTML='<option value="">— Semua tanggal —</option>'+tgls.map(t=>`<option>${t}</option>`).join('');
  $('distList').innerHTML=dists.map(d=>`<option value="${d.replace(/"/g,'&quot;')}">`).join('');
}

function cari(){
  const e=$('exp').value,t=$('tgl').value,d=$('dist').value.trim().toLowerCase();
  VIEW=ROWS.filter(r=>(!e||r.exp===e)&&(!t||r.tgl===t)&&(!d||r.dist.toLowerCase().includes(d)));
  render();
}

function render(){
  const box=$('results');
  if(!VIEW.length){box.innerHTML='<div class="panel empty">Tidak ada surat jalan yang cocok.</div>';return;}
  const seen=new Set();let total=0;
  VIEW.forEach(r=>{if(r.rate>0&&!seen.has(r.contKey)){seen.add(r.contKey);total+=r.rate;}});
  let html=`<div class="res-head"><h2>Hasil Pencarian</h2><span class="cnt">${VIEW.length} surat jalan</span></div>`;
  html+=`<div class="toolbar">
    <button class="btn btn-sec" id="selAll">Centang Semua</button>
    <button class="btn btn-sec" id="unAll">Hapus Centang</button>
  </div>`;
  if(total>0)html+=`<div class="total"><span>Total harga hasil (per kontainer)</span><b>${fmtRp(total)}</b></div>`;
  html+=VIEW.map(r=>{
    const on=SEL.has(r.id);
    return `<div class="card ${on?'sel':''}" data-id="${r.id}">
      <input type="checkbox" class="chk" ${on?'checked':''}>
      <div class="card-body">
        <div class="sj">${r.sj}</div>
        <div class="dist">${r.dist||'—'}</div>
        <div class="meta">
          <div><b>Ekspedisi</b>${r.exp||'—'}</div>
          <div><b>Tgl Kirim</b>${r.tgl||'—'}</div>
          <div><b>No SO</b>${r.so||'—'}</div>
          <div><b>Harga</b><span class="rate ${r.rate>0?'':'none'}">${r.rate>0?fmtRp(r.rate):'(ikut kontainer)'}</span></div>
        </div>
      </div>
    </div>`;
  }).join('');
  box.innerHTML=html;

  box.querySelectorAll('.card').forEach(card=>{
    const id=card.dataset.id;
    const cb=card.querySelector('.chk');
    const toggle=()=>{
      if(cb.checked){SEL.set(id,VIEW.find(r=>r.id===id));card.classList.add('sel');}
      else{SEL.delete(id);card.classList.remove('sel');}
      updateSelbar();
    };
    cb.addEventListener('change',toggle);
    card.addEventListener('click',e=>{if(e.target!==cb){cb.checked=!cb.checked;toggle();}});
  });
  $('selAll').onclick=()=>{VIEW.forEach(r=>SEL.set(r.id,r));render();};
  $('unAll').onclick=()=>{VIEW.forEach(r=>SEL.delete(r.id));render();};
  updateSelbar();
}

function updateSelbar(){
  $('selCount').textContent=SEL.size;
  $('selbar').classList.toggle('show',SEL.size>0);
}

function buildPrint(){
  const rows=[...SEL.values()];
  // kelompokkan per kontainer
  const groups={};
  rows.forEach(r=>{
    const k=r.contKey||(r.nopol+'|'+r.exp+'|'+r.tgl+'|'+r.cont);
    if(!groups[k]) groups[k]={nopol:r.nopol,exp:r.exp,tgl:r.tgl,cont:r.cont,dist:r.dist,rate:r.rate||0,sj:[],so:[]};
    const gg=groups[k];
    if(r.rate>0) gg.rate=r.rate;
    if(r.sj && !gg.sj.includes(r.sj)) gg.sj.push(r.sj);
    if(r.so && !gg.so.includes(r.so)) gg.so.push(r.so);
    if(!gg.dist && r.dist) gg.dist=r.dist;
  });
  // hanya kontainer yang ADA harganya
  let list=Object.values(groups).filter(g=>g.rate>0);
  const total=list.reduce((s,g)=>s+g.rate,0);
  const today=new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'});
  const skipped=Object.values(groups).length-list.length;

  const body=list.map((g,i)=>{
    const pairs=[];
    const n=Math.max(g.sj.length,g.so.length);
    for(let x=0;x<n;x++){
      const sj=g.sj[x]||'';const so=g.so[x]||'';
      pairs.push(`<div class="pair"><span>${sj||'—'}</span><span>${so||'—'}</span></div>`);
    }
    return `<tr>
      <td>${i+1}</td>
      <td>${g.dist||'—'}</td>
      <td>${g.exp||'—'}</td>
      <td>${g.nopol||'—'}<br><small>${g.cont||''}</small></td>
      <td>${g.tgl||'—'}</td>
      <td class="pairs"><div class="pair phead"><span>No SPA</span><span>No SO</span></div>${pairs.join('')}</td>
      <td class="r">${fmtRp(g.rate)}</td>
    </tr>`;
  }).join('');

  $('printArea').innerHTML=`
    <div class="p-head">
      <h2>REKAP SURAT JALAN</h2>
      <p>PT. UNIFAM</p>
    </div>
    <div class="p-meta">
      <div>Tanggal cetak: ${today}</div>
      <div>Jumlah kontainer: ${list.length}</div>
    </div>
    <table>
      <thead><tr>
        <th>No</th><th>Distributor</th><th>Ekspedisi</th><th>Nopol / Kontainer</th><th>Tgl Kirim</th><th>No SPA &amp; No SO</th><th class="r">Harga</th>
      </tr></thead>
      <tbody>${body}</tbody>
      <tfoot><tr><td colspan="6" class="r">TOTAL</td><td class="r">${fmtRp(total)||'Rp 0'}</td></tr></tfoot>
    </table>
    ${skipped>0?`<p style="font-size:11px;color:#666;margin-top:6px">*) ${skipped} kontainer terpilih tidak dicetak karena belum ada harga.</p>`:''}
    <div class="p-sign">
      <div>Dibuat oleh,<div class="line">( .................. )</div></div>
      <div>Disetujui oleh,<div class="line">( .................. )</div></div>
    </div>`;
}

$('cari').onclick=cari;
$('dist').addEventListener('keydown',e=>{if(e.key==='Enter')cari();});
$('reload').onclick=loadData;
$('clearSel').onclick=()=>{SEL.clear();render();updateSelbar();};
$('printSel').onclick=()=>{
  if(!SEL.size)return;
  buildPrint();
  setTimeout(()=>window.print(),100);
};
loadData();
</script>
</body>
</html>
